<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500">
  <rect width="1000" height="500" fill="#1a1a2e"/>
  <text x="500" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Telegram AI Store Assistant — n8n Workflow</text>
  
  <!-- Telegram Trigger -->
  <rect x="60" y="200" width="130" height="80" rx="10" fill="#2d2d44" stroke="#229ed9" stroke-width="2"/>
  <circle cx="95" cy="230" r="18" fill="#229ed9"/>
  <text x="95" y="236" font-family="Arial" font-size="13" fill="#fff" text-anchor="middle">✈</text>
  <text x="125" y="245" font-family="Arial" font-size="10" fill="#ccc" text-anchor="middle">Telegram</text>
  <text x="125" y="258" font-family="Arial" font-size="10" fill="#ccc" text-anchor="middle">Trigger</text>
  
  <!-- Arrow -->
  <line x1="190" y1="240" x2="240" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Stock Data -->
  <rect x="240" y="200" width="130" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <rect x="258" y="218" width="55" height="16" rx="3" fill="#0f9d58"/>
  <text x="285" y="229" font-family="Arial" font-size="9" fill="#fff" text-anchor="middle">Sheets</text>
  <text x="305" y="252" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">stock data</text>
  <text x="305" y="265" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">read: sheet</text>
  
  <!-- Arrow -->
  <line x1="370" y1="240" x2="420" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- AI Agent -->
  <rect x="420" y="180" width="160" height="100" rx="10" fill="#2d2d44" stroke="#9c27b0" stroke-width="2"/>
  <text x="440" y="225" font-family="Arial" font-size="22" fill="#9c27b0">🤖</text>
  <text x="510" y="225" font-family="Arial" font-size="14" fill="#ccc" text-anchor="middle">AI Agent</text>
  <text x="470" y="245" font-family="Arial" font-size="8" fill="#888">Chat Model*</text>
  <text x="540" y="245" font-family="Arial" font-size="8" fill="#888">Memory</text>
  <text x="560" y="245" font-family="Arial" font-size="8" fill="#888">Tool</text>
  
  <!-- Sub-nodes -->
  <line x1="480" y1="280" x2="430" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4"/>
  <line x1="540" y1="280" x2="540" y2="340" stroke="#555" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Mistral -->
  <rect x="380" y="340" width="100" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="430" y="378" font-family="Arial" font-size="22" fill="#ff6b35" text-anchor="middle">🔥</text>
  <text x="430" y="400" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Mistral AI</text>
  
  <!-- Memory -->
  <rect x="490" y="340" width="100" height="70" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <text x="540" y="378" font-family="Arial" font-size="22" fill="#4fc3f7" text-anchor="middle">🗄</text>
  <text x="540" y="400" font-family="Arial" font-size="9" fill="#aaa" text-anchor="middle">Simple Memory</text>
  
  <!-- Arrow -->
  <line x1="580" y1="240" x2="630" y2="240" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  
  <!-- Send Message -->
  <rect x="630" y="200" width="130" height="80" rx="10" fill="#2d2d44" stroke="#555" stroke-width="1"/>
  <circle cx="665" cy="230" r="18" fill="#229ed9"/>
  <text x="665" y="236" font-family="Arial" font-size="13" fill="#fff" text-anchor="middle">✈</text>
  <text x="720" y="245" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">Send text</text>
  <text x="720" y="258" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">message</text>
  
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  
  <text x="500" y="460" font-family="Arial" font-size="12" fill="#888" text-anchor="middle">Built with n8n | AI-powered Telegram store assistant using Mistral AI and Google Sheets inventory</text>
</svg>
